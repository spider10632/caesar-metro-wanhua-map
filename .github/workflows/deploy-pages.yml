name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        env:
          MAPS_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          COMMENT_API_ENDPOINT: ${{ secrets.COMMENT_API_ENDPOINT }}
          COMMENT_API_TOKEN: ${{ secrets.COMMENT_API_TOKEN }}
        run: |
          mkdir -p dist
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "dist" \
            ./ dist/
          {
            printf 'window.GOOGLE_MAPS_API_KEY = "%s";\n' "$MAPS_KEY"
            printf 'window.GOOGLE_MAPS_USE_EMBED_API = false;\n'
            printf 'window.COMMENT_API_ENDPOINT = "%s";\n' "$COMMENT_API_ENDPOINT"
            printf 'window.COMMENT_API_TOKEN = "%s";\n' "$COMMENT_API_TOKEN"
          } > dist/google-maps-config.js
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
